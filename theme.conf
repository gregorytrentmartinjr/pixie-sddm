[General]
# Path to the wallpaper. If it's in the assets folder, use "assets/background.jpg"
background=assets/background.jpg

# Material You-like colors (we can refine these)
primaryColor=#E3E3DC
accentColor=#A9C78F
backgroundColor=#1A1C18
textColor=#E3E3DC

# Font settings
fontFamily=Google Sans Flex Freeze
fontSize=12

# Clock format – uses the same values as the OS quickshell config:
#   "hh:mm"   = 24-hour (default)
#   "h:mm AP" = 12-hour with AM/PM
#   "h:mm ap" = 12-hour with am/pm
clockFormat=hh:mm
