[General]
# Path to the wallpaper. If it's in the assets folder, use "assets/background.jpg"
background=assets/background.jpg

# Material You-like colors (we can refine these)
primaryColor=#E3E3DC
accentColor=#A9C78F
backgroundColor=#1A1C18
textColor=#E3E3DC

# Font settings
fontFamily=Google Sans Flex Freeze
fontSize=12

# Clock format. Resolution priority (highest first):
#   1. /var/lib/pixie-sddm/state.conf  (synced from quickshell BarConfig)
#   2. this clockFormat value (when not "auto")
#   3. system locale (LC_TIME from /etc/locale.conf, change with localectl)
#
# Values:
#   auto      = use the priority chain above
#   hh:mm     = force 24-hour
#   h:mm AP   = force 12-hour AM/PM
#   h:mm ap   = force 12-hour am/pm
clockFormat=auto
